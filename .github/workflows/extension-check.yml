name: Extension sintaksa

# Extension nima pravega test suita (premalo logike da bi ga upravičila) —
# ta workflow samo prepreči da bi se v main zlila sintaktično pokvarjena
# JS datoteka ali neveljaven manifest.json (oboje se je med razvojem
# že zgodilo in bi ju sicer opazili šele ročno v Chromu).
on:
  push:
    branches: [main]
    paths:
      - 'loom-extension/**'
      - 'VERSION'
      - '.github/workflows/extension-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'loom-extension/**'
      - 'VERSION'
      - '.github/workflows/extension-check.yml'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Nastavi Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Preveri sintakso JS datotek
        working-directory: loom-extension
        run: |
          node -c background.js
          node -c popup.js

      - name: Preveri veljavnost manifest.json
        working-directory: loom-extension
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json', 'utf8')); console.log('manifest.json OK')"

      - name: Preveri da je manifest.json usklajen z /VERSION
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          MANIFEST_VERSION=$(node -e "console.log(require('./loom-extension/manifest.json').version)")
          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "manifest.json (${MANIFEST_VERSION}) se ne ujema z /VERSION (${VERSION})"
            echo "Poženi: node scripts/sync-extension-version.js"
            exit 1
          fi
          echo "manifest.json usklajen z /VERSION (${VERSION})"
